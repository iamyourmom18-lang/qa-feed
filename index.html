<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Q&A Live Feed</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; padding: 16px; }
    h1 { font-size: 20px; font-weight: 700; color: #61dafb; text-align: center; padding: 16px 0 20px; }
    .status { text-align: center; font-size: 12px; color: #64748b; margin-bottom: 20px; }
    .status.live { color: #22c55e; }
    .entry { background: #1e293b; border: 1px solid #334155; border-radius: 10px; padding: 14px; margin-bottom: 14px; }
    .entry-meta { font-size: 11px; color: #64748b; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 4px; }
    .entry-url { color: #60a5fa; word-break: break-all; font-size: 11px; }
    .qa-block { margin-top: 10px; }
    .qa-q { font-size: 13px; font-weight: 700; color: #f59e0b; margin-bottom: 4px; }
    .qa-a { font-size: 13px; color: #cbd5e1; line-height: 1.5; margin-bottom: 10px; }
    .empty { text-align: center; color: #475569; font-size: 14px; padding: 60px 20px; }
    .clear-btn { display: block; width: 100%; padding: 12px; background: #ef4444; color: white; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; }
    .clear-btn:active { background: #dc2626; }
  </style>
</head>
<body>
  <h1>🔍 Q&A Live Feed</h1>
  <div class="status" id="status">Connecting...</div>

  <div id="feed">
    <div class="empty" id="empty">No questions yet.<br/>Enable the extension and open a page.</div>
  </div>

  <button class="clear-btn" id="clearBtn">Clear All</button>

  <script>
    const feed    = document.getElementById('feed');
    const empty   = document.getElementById('empty');
    const status  = document.getElementById('status');
    const clearBtn = document.getElementById('clearBtn');

    const source = new EventSource('/stream');

    source.onopen = () => {
      status.textContent = '🟢 Live — updates appear instantly';
      status.className = 'status live';
    };

    source.onmessage = (event) => {
      const data = JSON.parse(event.data);
      if (data.type === 'clear') { clearFeed(); return; }
      empty.style.display = 'none';
      addEntry(data);
    };

    source.onerror = () => {
      status.textContent = '🔴 Disconnected — refresh to reconnect';
      status.className = 'status';
    };

    function addEntry(entry) {
      const div = document.createElement('div');
      div.className = 'entry';
      const qas = (entry.results || []).map((item, i) => `
        <div class="qa-block">
          <div class="qa-q">Q${i+1}: ${esc(item.question)}</div>
          <div class="qa-a">A: ${esc(item.answer)}</div>
        </div>
      `).join('');

      div.innerHTML = `
        <div class="entry-meta">
          <span>${entry.timestamp}</span>
          <a class="entry-url" href="${esc(entry.url)}" target="_blank">${esc(entry.url)}</a>
        </div>
        ${qas}
      `;
      feed.insertBefore(div, feed.firstChild);
    }

    function clearFeed() {
      feed.querySelectorAll('.entry').forEach(e => e.remove());
      empty.style.display = 'block';
    }

    clearBtn.addEventListener('click', () => {
      if (confirm('Clear all Q&A?')) {
        fetch('/clear', { method: 'POST' });
        clearFeed();
      }
    });

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
